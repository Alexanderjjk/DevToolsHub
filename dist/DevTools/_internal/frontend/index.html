<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' 'unsafe-eval'; img-src data: blob: 'self';">
    <title>DevTools</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <!-- ========== HEADER (macOS-style) ========== -->
    <header id="app-header" class="app-header">
        <div class="header-drag-area">
            <div class="header-left">
                <span class="header-icon">&#9881;</span>
                <span class="header-title">DevTools</span>
                <span class="header-version">v0.9.6</span>
            </div>
        </div>
        <div class="header-center">
            <div class="global-search-trigger" id="global-search-trigger" title="">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                <span>Buscar...</span>
                <kbd id="search-shortcut-hint">Ctrl+K</kbd>
            </div>
        </div>
        <div class="header-controls">
            <button id="btn-minimize" class="header-btn header-btn-minimize" title="Minimizar"></button>
            <button id="btn-maximize" class="header-btn header-btn-maximize" title="Maximizar"></button>
            <button id="btn-close" class="header-btn header-btn-close" title="Cerrar"></button>
        </div>
    </header>

    <!-- ========== MAIN LAYOUT ========== -->
    <div class="app-body">
        <!-- Sidebar (colapsable 240px / 60px) -->
        <nav id="sidebar" class="sidebar collapsed">
            <div class="sidebar-top">
                <div class="sidebar-logo">
                    <span class="logo-icon">&#9881;</span>
                    <span class="logo-text">DevTools</span>
                </div>
                <div class="sidebar-divider"></div>
                <div class="sidebar-nav">
                    <button class="nav-item active" data-section="home" title="Inicio">
                        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                        <span class="nav-label">Inicio</span>
                    </button>
                    <button class="nav-item" data-section="tools" title="App Launcher">
                        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="9" height="9" rx="1"/><rect x="13" y="2" width="9" height="9" rx="1"/><rect x="2" y="13" width="9" height="9" rx="1"/><rect x="13" y="13" width="9" height="9" rx="1"/></svg>
                        <span class="nav-label">Launcher</span>
                    </button>
                    <button class="nav-item" data-section="docs" title="Documentacion">
                        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></svg>
                        <span class="nav-label">Docs</span>
                    </button>
                    <button class="nav-item" data-section="notes" title="Modo Notion">
                        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
                        <span class="nav-label">Notas</span>
                    </button>
                    <button class="nav-item" data-section="flowcharts" title="Diagramas">
                        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><circle cx="17.5" cy="6.5" r="3.5"/><polygon points="12 16 22 16 17 22"/><rect x="3" y="16" width="5" height="5" rx="1"/></svg>
                        <span class="nav-label">Diagramas</span>
                    </button>
                    <button class="nav-item" data-section="cmds" title="Comandos">
                        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>
                        <span class="nav-label">Comandos</span>
                    </button>
                    <button class="nav-item" data-section="tasks" title="Tareas">
                        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
                        <span class="nav-label">Tareas</span>
                    </button>
                    <button class="nav-item" data-section="timer" title="Temporizador">
                        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                        <span class="nav-label">Timer</span>
                    </button>
                    <button class="nav-item" data-section="stats" title="Estadisticas">
                        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 20V10"/><path d="M12 20V4"/><path d="M6 20v-6"/></svg>
                        <span class="nav-label">Stats</span>
                    </button>
                    <button class="nav-item" data-section="about" title="Sobre Nosotros">
                        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
                        <span class="nav-label">Info</span>
                    </button>
                    <div class="sidebar-divider"></div>
                    <button class="nav-item" id="btn-settings" title="Configuracion">
                        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.32 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
                        <span class="nav-label">Config</span>
                    </button>
                </div>
            </div>
            <div class="sidebar-bottom">
                <div class="sidebar-divider"></div>
                <div class="sidebar-bottom-actions">
                    <button class="nav-item" id="btn-collapse-sidebar" title="Colapsar sidebar">
                        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="11 17 6 12 11 7"/><polyline points="18 17 13 12 18 7"/></svg>
                        <span class="nav-label">Colapsar</span>
                    </button>
                </div>
            </div>
        </nav>

        <!-- Contenido principal -->
        <main id="content-area" class="content-area selectable">
            <div id="section-container" class="section-container selectable">
                <div id="loading-spinner" class="spinner-container">
                    <div class="spinner"></div>
                    <p>Cargando...</p>
                </div>
            </div>
        </main>
    </div>

    <!-- ========== GLOBAL SEARCH OVERLAY ========== -->
    <div id="global-search-overlay" class="global-search-overlay hidden">
        <div class="global-search-box">
            <div class="global-search-input-wrap">
                <svg class="global-search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                <input type="text" id="global-search-input" placeholder="Buscar en Docs, Notas, Tareas, Launcher..." autocomplete="off">
                <kbd id="global-search-esc">Esc</kbd>
            </div>
            <div id="global-search-results" class="global-search-results">
                <div class="global-search-hint">
                    <p>Escribe para buscar en todos los modulos</p>
                    <div class="global-search-shortcuts">
                        <span><kbd>Tab</kbd> navegar</span>
                        <span><kbd>Enter</kbd> abrir</span>
                        <span><kbd>Esc</kbd> cerrar</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- ========== MODAL GENERICO ========== -->
    <div id="modal-overlay" class="modal-overlay hidden">
        <div id="modal-box" class="modal-box">
            <div class="modal-header">
                <h3 id="modal-title">Confirmar</h3>
            </div>
            <div class="modal-body">
                <p id="modal-message">Estas seguro?</p>
            </div>
            <div class="modal-footer">
                <button id="modal-cancel" class="btn btn-secondary">Cancelar</button>
                <button id="modal-confirm" class="btn btn-danger">Confirmar</button>
            </div>
        </div>
    </div>

    <!-- ========== TOASTS CONTAINER ========== -->
    <div id="toast-container" class="toast-container"></div>

    <!-- ========== THEME PICKER ========== -->
    <div id="theme-picker" class="theme-picker hidden">
        <div class="theme-picker-content">
            <h3>Color de acento</h3>
            <div class="theme-colors">
                <button class="theme-color-btn" data-accent="#7254cc" data-color="violet" style="background:#7254cc;" title="Violeta"></button>
                <button class="theme-color-btn" data-accent="#3b82f6" data-color="blue" style="background:#3b82f6;" title="Azul"></button>
                <button class="theme-color-btn" data-accent="#8b5cf6" data-color="purple" style="background:#8b5cf6;" title="Purpura"></button>
                <button class="theme-color-btn" data-accent="#06b6d4" data-color="cyan" style="background:#06b6d4;" title="Cyan"></button>
                <button class="theme-color-btn" data-accent="#22c55e" data-color="green" style="background:#22c55e;" title="Verde"></button>
                <button class="theme-color-btn" data-accent="#eab308" data-color="yellow" style="background:#eab308;" title="Amarillo"></button>
                <button class="theme-color-btn" data-accent="#f97316" data-color="orange" style="background:#f97316;" title="Naranja"></button>
                <button class="theme-color-btn" data-accent="#ef4444" data-color="red" style="background:#ef4444;" title="Rojo"></button>
                <button class="theme-color-btn" data-accent="#ec4899" data-color="pink" style="background:#ec4899;" title="Rosa"></button>
                <button class="theme-color-btn" data-accent="#64748b" data-color="slate" style="background:#64748b;" title="Gris"></button>
            </div>
        </div>
    </div>

    <!-- ========== SETTINGS PANEL (floating) ========== -->
    <div id="settings-panel-overlay" class="settings-panel-overlay hidden"></div>
    <div id="settings-panel" class="settings-panel hidden">
        <div class="settings-panel-header">
            <span class="settings-panel-title">Configuracion</span>
            <button class="settings-panel-close" id="settings-panel-close-btn">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
        </div>
        <div class="settings-panel-body" id="settings-panel-body">
            <!-- Dynamic content injected by JS -->
        </div>
    </div>

    <!-- ========== TIMER OVERLAY ========== -->
    <div id="timer-overlay" class="timer-overlay hidden">
        <div class="timer-display-large">
            <span id="timer-big-display">00:00:00</span>
        </div>
    </div>

    <!-- ========== WINDOW RESIZE HANDLES ========== -->
    <div class="window-resize-handle window-resize-n" data-resize="n"></div>
    <div class="window-resize-handle window-resize-s" data-resize="s"></div>
    <div class="window-resize-handle window-resize-w" data-resize="w"></div>
    <div class="window-resize-handle window-resize-e" data-resize="e"></div>
    <div class="window-resize-handle window-resize-nw" data-resize="nw"></div>
    <div class="window-resize-handle window-resize-ne" data-resize="ne"></div>
    <div class="window-resize-handle window-resize-sw" data-resize="sw"></div>
    <div class="window-resize-handle window-resize-se" data-resize="se"></div>

    <!-- Scripts -->
    <script src="js/app.js"></script>
</body>
</html>
